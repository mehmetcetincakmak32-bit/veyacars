<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeyaCars | Platinum Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fbfbfd; }
        .apple-card { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.8); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 apple-card rounded-3xl shadow-2xl border border-white">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-semibold tracking-tight text-gray-900 italic">Veya<span class="font-light not-italic text-gray-500">Cars</span></h1>
            <p class="text-gray-400 mt-2 text-sm uppercase tracking-widest font-semibold">Platinum Access</p>
        </div>

        <form class="space-y-6">
            <div>
                <input type="email" placeholder="E-posta" class="w-full px-5 py-4 rounded-2xl bg-gray-100 border-none focus:ring-2 focus:ring-blue-500 transition-all outline-none text-gray-700">
            </div>
            <div>
                <input type="password" placeholder="Şifre" class="w-full px-5 py-4 rounded-2xl bg-gray-100 border-none focus:ring-2 focus:ring-blue-500 transition-all outline-none text-gray-700">
            </div>
            
            <button type="submit" class="w-full py-4 bg-black text-white rounded-2xl font-semibold hover:bg-gray-800 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                Oturum Aç
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="#" class="text-sm text-blue-600 hover:underline">Şifremi Unuttum</a>
        </div>
    </div>

</body>
</html>
